{% extends 'base.html' %}

{% block content %}

<style>

.form-card{
    width:450px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h3{
    text-align:center;
    margin-bottom:20px;
}

form p{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e7e34;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:10px;
    padding:10px;
    background:#1a1aff;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

</style>


<div class="form-card">

<h3>Update Employee</h3>

<form method="POST">
    {% csrf_token %}
    
    {{ form.as_p }}

    <button type="submit">Update Employee</button>
</form>

<a class="back-btn" href="{% url 'list' %}">Back to List</a>

</div>

{% endblock %}
