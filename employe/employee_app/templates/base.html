<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} EMPLOYE CRUD {% endblock %}</title>
        <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:20px;
        }
        .container{
            background:white;
            padding:20px;
            border-radius:10px;
        }
        table{
            width:100%;
            border-collapse:collapse;
        }
        th,td{
            padding:10px;
            border:1px solid #ddd;
        }
        a{
            text-decoration:none;
            padding:5px 10px;
            background:blue;
            color:white;
            border-radius:4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Employee Management System</h2>
        {% block content %}
        {% endblock %}
    </div>
    
</body>
</html>
